services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      - ./backend/voice_presets:/app/voice_presets
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - FISH_SPEECH_URL=http://fish-speech:8080
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      fish-speech:
        condition: service_healthy

  fish-speech:
    image: fishaudio/fish-speech:latest
    ports:
      - "8080:8080"
    volumes:
      - fish-speech-models:/checkpoints
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: >
      python tools/api_server.py
      --llama-checkpoint-path /checkpoints/s2-pro
      --decoder-checkpoint-path /checkpoints/s2-pro/codec.pth
      --listen 0.0.0.0:8080
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fish-speech-models:
